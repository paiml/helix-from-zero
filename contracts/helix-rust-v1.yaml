metadata:
  version: 1.0.0
  created: '2026-05-10'
  author: 'PAIML Engineering'
  description: |
    Provable contracts for the helix-from-zero reference workspace
    (Coursera Rust for Data Engineering c20 — HelixDB from Zero).
    Four runtime invariants pinned on the response of the lesson 5.1.3
    Rust client demo:

      * crates/helix-client/examples/list_top_films.rs
        — calls listTopFilms(genre="Comedy", limit=5) on `helix push dev`
        and decodes the response as Vec<FilmHit>.

    Each obligation maps to one of the four pure functions in
    crates/helix-client/src/contracts.rs (assert_row_count,
    assert_top_score_non_negative, assert_all_ids_positive,
    assert_descending_sort) and to one `?`-applied call in the example
    body. The YAML below is the formal spec linted by `pv lint
    contracts/`; each obligation maps to an `assert!`-shaped Result
    return in the corresponding pure function.
  references:
    - 'helix-from-zero README §Provable contracts'
    - 'paiml/aprender (pv) — provable-contracts CLI'
    - 'db/queries.hx listTopFilms — the QUERY the contract reads'

equations:
  helix_row_count_exact:
    formula: 'len(hits) == 5'
    domain: 'hits ∈ Vec<FilmHit>, top_k = 5'
    codomain: 'bool'
    lean_theorem: Theorems.HelixRust.HelixRowCountExact
    postconditions:
    - 'hits.len() == 5'

  helix_top_score_non_negative:
    formula: 'hits[0].score >= 0.0'
    domain: 'hits ∈ Vec<FilmHit>, hits non-empty'
    codomain: 'bool'
    lean_theorem: Theorems.HelixRust.HelixTopScoreNonNegative
    postconditions:
    - 'hits[0].score >= 0.0'

  helix_film_id_positive:
    formula: 'forall h in hits. h.id > 0'
    domain: 'hits ∈ Vec<FilmHit>'
    codomain: 'bool'
    lean_theorem: Theorems.HelixRust.HelixFilmIdPositive
    postconditions:
    - 'all hits have id > 0'

  helix_score_descending:
    formula: 'forall i. hits[i].score >= hits[i+1].score'
    domain: 'hits ∈ Vec<FilmHit>, ordered by listTopFilms ORDER<Asc>'
    codomain: 'bool'
    lean_theorem: Theorems.HelixRust.HelixScoreDescending
    postconditions:
    - 'hits.score is monotonically non-increasing'
